name: Update Rankings Data

on:
  schedule:
    # 每天 UTC 00:05 (UTC+8 08:05) 全量更新
    - cron: '5 0 * * *'
    # 每小时更新资金费率
    - cron: '7 * * * *'
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch_data.py (single run)
        run: |
          python -c "
          from fetch_data import *
          import json

          print('获取合约列表...')
          symbols = get_usdt_perpetual_symbols()
          print(f'{len(symbols)} 个合约')

          yesterday_data, funding_data, momentum_data = fetch_daily_data(symbols)
          weekly_data, rsi_data = fetch_weekly_data(symbols)

          output = build_rankings(symbols, yesterday_data, weekly_data, funding_data, rsi_data, momentum_data)
          save_data(output)
          print(f'数据已更新: {output[\"updateTime\"]}')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json
          git diff --staged --quiet || git commit -m "自动更新数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
